spring.application.name=auth-service
# server.port=9091

# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${VALOR_DDL}
spring.jpa.show-sql=true

# Configuracion Actuador
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# management.endpoints.web.exposure.include=health
# management.endpoint.health.show-details=never

# Configuración de Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://${ES_HOST}:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.uuid}