# Configuración general de Spring
spring.application.name=microservicio-articulos
server.port=8083

# Configuración de imagenes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${VALOR_DDL}
spring.jpa.show-sql=true

# Configuración de Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
marca.agua.pagina=${MARCA_AGUA_PAGINA}

# Configuración de Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://${ES_HOST}:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.uuid}

# Configuracion Actuador
# management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
# management.endpoints.web.base-path=/manage

